<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 첫 서비스</title>
    <!-- 폰트 적용 (가독성 높은 Noto Sans KR 사용) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #81c784;
            /* 주 색상: 연한 녹색 */
            --secondary-color: #2e7d32;
            /* 보조 색상: 어두운 녹색 */
            --bg-color: #f1f8e9;
            /* 배경: 매우 연한 녹색 타일 색상 */
            --text-main: #202124;
            --text-muted: #5f6368;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            font-weight: 400;
            /* 본문 일반 굵기 설정 */
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 13px;
            /* 제목보다 작게 조정 */
            font-weight: 400;
            /* 네비게이션 본문 굵기 */
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .section-title {
            text-align: center;
            color: var(--secondary-color);
            font-size: 24px;
            margin: 40px 0 20px 0;
            font-weight: 700;
        }

        .card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 50px;
            border: 2px solid white;
        }

        .card h2 {
            font-size: 28px;
            color: var(--text-main);
            margin: 0 0 15px 0;
            font-weight: 700;
        }

        .card hr {
            width: 30px;
            border: none;
            border-top: 3px solid var(--primary-color);
            margin: 20px auto;
        }

        .card p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 400;
            /* 본문 일반 굵기 */
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn:hover {
            background-color: var(--secondary-color);
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        /* 사용자 후기 섹션 */
        .reviews {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 50px;
        }

        .review-card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 30px;
            flex: 1;
            /* 너비를 반반으로 맞춤 */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 2px solid white;
            text-align: left;
            box-sizing: border-box;
        }

        .review-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .review-header img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin-right: 15px;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }

        .review-header strong {
            font-size: 15px;
            color: var(--text-main);
            font-weight: 700;
            /* 작성자 이름 굵게 */
        }

        .review-card p {
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.6;
            margin: 0;
            word-wrap: break-word;
            font-weight: 400;
            /* 후기 본문 일반 굵기 */
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* 모바일 최적화 반응형 디자인 (768px 이하) */
        @media (max-width: 768px) {
            header {
                flex-direction: row;
                /* 다시 가로 배치로 복구 */
                padding: 15px 20px;
                gap: 10px;
            }

            header h1 {
                font-size: 16px;
                /* 모바일에서 제목(아이콘 포함) 크기 축소 */
            }

            /* 메뉴 가로 정렬 복구 */
            header nav {
                display: flex;
                flex-direction: row;
                width: auto;
                gap: 12px;
                /* 메뉴 간격 */
            }

            header nav a {
                margin: 0;
                padding: 0;
                font-size: 12px;
                /* 제목(16px)보다 명확하게 작게 설정 */
                background-color: transparent;
                /* 박스형 배경색 제거 */
                transition: opacity 0.2s;
            }

            header nav a:hover {
                background-color: transparent;
                opacity: 0.8;
            }

            .section-title {
                font-size: 22px;
                margin: 20px 0 15px 0;
            }

            .reviews {
                flex-direction: column;
                gap: 20px;
            }

            /* 모바일 화면 너비에 맞게 내부 여백 축소 */
            .card,
            .review-card {
                padding: 30px 20px;
            }

            .card h2 {
                font-size: 24px;
            }

            /* 모바일 본문 폰트 크기 축소 */
            .card p {
                font-size: 13px;
            }

            .review-card p {
                font-size: 12px;
            }

            /* 모바일 환경에서 터치하기 쉽도록 버튼 패딩 확대 */
            .btn {
                padding: 16px 36px;
                font-size: 15px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>
            <!-- 번개 아이콘 추가: 색상은 부모 요소(흰색)를 자동으로 따라갑니다 (fill="currentColor"). -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
            </svg>
            나의 첫 서비스
        </h1>
        <nav>
            <a href="#">소개</a>
            <a href="#">기능</a>
            <a href="#">문의</a>
        </nav>
    </header>

    <div class="container">
        <!-- 핵심 기능 소개 섹션 (첨부 이미지와 동일) -->
        <h2 class="section-title">핵심 기능 소개</h2>

        <div class="card">
            <h2 id="message">오늘도 힘내세요!</h2>
            <hr>
            <p id="subMessage">당신의 소중한 하루가<br>기분 좋은 일들로 가득하기를.</p>
            <button class="btn" id="nextBtn">다음 문장 보기</button>
        </div>

        <!-- 사용자 후기 섹션 (가로 나란히 배치) -->
        <h2 class="section-title">사용자 후기</h2>

        <div class="reviews">
            <!-- 김지은 님 후기 -->
            <div class="review-card">
                <div class="review-header">
                    <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="김지은 님 프로필">
                    <strong>김지은 님</strong>
                </div>
                <p>"매일 아침 이 서비스를 보면서 하루를 시작해요. 작은 문장 하나가 정말 큰 힘이 됩니다. 디자인도 너무 예뻐서 자꾸 들어오게 되네요!"</p>
            </div>

            <!-- 이민수 님 후기 -->
            <div class="review-card">
                <div class="review-header">
                    <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="이민수 님 프로필">
                    <strong>이민수 님</strong>
                </div>
                <p>"개발 공부를 하다가 지칠 때마다 클릭해봅니다. '조금씩 나아지고 있어요'라는 문구를 보고 다시 힘을 얻었어요. 정말 감사합니다."</p>
            </div>
        </div>

        <!-- 하단 푸터 -->
        <footer>
            &copy; 2025 My Service
        </footer>
    </div>

    <!-- 순차적인 문장 전환 기능 구현 -->
    <script>
        const messages = [
            { main: '오늘도 힘내세요!', sub: '당신의 소중한 하루가<br>기분 좋은 일들로 가득하기를.' },
            { main: '오늘도 해냈어요!', sub: '작은 성취가 모여<br>큰 성공을 만듭니다.' },
            { main: '조금씩 나아지고 있어요!', sub: '어제보다 나은 오늘,<br>오늘보다 빛날 내일을 응원합니다.' },
            { main: '이대로 계속 가봅시다.', sub: '포기하지 않고 달리는 당신이<br>가장 아름답습니다.' }
        ];

        let currentIndex = 0;
        const messageEl = document.getElementById('message');
        const subMessageEl = document.getElementById('subMessage');
        const nextBtn = document.getElementById('nextBtn');

        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % messages.length;
            messageEl.innerHTML = messages[currentIndex].main;
            subMessageEl.innerHTML = messages[currentIndex].sub;
        });
    </script>
</body>

</html>
