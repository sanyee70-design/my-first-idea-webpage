<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>첫번째 아이디어</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Pretendard 폰트 사용 (한글에 적합) */
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #141026, #2d204d, #120e1a);
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 4rem 6rem;
            background: rgba(255, 223, 0, 0.03);
            border-radius: 32px;
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 223, 0, 0.1);
            transform: translateY(0);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border 0.4s ease;
            cursor: pointer;
        }

        .container:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px 0 rgba(255, 215, 0, 0.15);
            background: rgba(255, 223, 0, 0.06);
            border: 1px solid rgba(255, 223, 0, 0.3);
        }

        h1 {
            margin: 0;
            font-size: 6.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(120deg, #FFF066 0%, #FFB800 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 8px 16px rgba(255, 184, 0, 0.3));
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>내 첫 번째 아이디어</h1>
    </div>
</body>
</html>
