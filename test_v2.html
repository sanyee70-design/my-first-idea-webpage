<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 첫 서비스</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: auto;
            min-height: 100%;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            color: #2d3436;
            background: #f8f9fa;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #0984e3, #00a8ff);
            color: white;
            padding: 1rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 800;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 2rem;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        main {
            width: 100%;
        }

        section {
            padding: 120px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .section-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 60px;
            text-align: center;
        }

        .features-section {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ed 100%);
        }

        .reviews-section {
            background: #ffffff;
            border-top: 1px solid #eee;
        }

        .container {
            text-align: center;
            padding: 4rem;
            background: white;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            max-width: 800px;
            width: 90%;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 20px;
            background: linear-gradient(180deg, #2d3436 0%, #636e72 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            background: #0984e3;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(9, 132, 227, 0.3);
        }

        .reviews-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1100px;
        }

        .review-card {
            background: #fdfdfd;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 350px;
            border: 1px solid #f1f1f1;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .user-img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 3px solid #0984e3;
        }

        .user-name {
            font-weight: 800;
            font-size: 20px;
        }

        .review-text {
            color: #636e72;
            line-height: 1.8;
            font-size: 16px;
        }

        footer {
            background: #2d3436;
            color: white;
            padding: 40px;
            text-align: center;
        }
    </style>
</head>

<body>
    <header>
        <h2>나의 첫 서비스</h2>
        <nav>
            <ul>
                <li><a href="#">소개</a></li>
                <li><a href="#">기능</a></li>
                <li><a href="#">문의</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="features-section">
            <h3 class="section-title">핵심 기능 소개</h3>
            <div class="container">
                <h1>오늘도 힘내세요!</h1>
                <button class="btn" id="nextBtn">다음 문장 보기</button>
            </div>
        </section>

        <section class="reviews-section">
            <h3 class="section-title">사용자 후기</h3>
            <div class="reviews-container">
                <div class="review-card">
                    <div class="user-info">
                        <img src="C:\Users\pc\.gemini\antigravity\brain\73adda70-a8ec-462d-9715-4c7fe3cdcb4c\user_profile_1_1773727334916.png" alt="User 1" class="user-img">
                        <div class="user-name">김민준</div>
                    </div>
                    <p class="review-text">"매일 아침 이 앱의 한마디를 보며 하루를 시작합니다. 정말 큰 위로가 돼요!"</p>
                </div>
                <div class="review-card">
                    <div class="user-info">
                        <img src="C:\Users\pc\.gemini\antigravity\brain\73adda70-a8ec-462d-9715-4c7fe3cdcb4c\user_profile_2_1773727347488.png" alt="User 2" class="user-img">
                        <div class="user-name">이지수</div>
                    </div>
                    <p class="review-text">"디자인이 너무 예뻐서 계속 들어오게 되네요. 기능도 심플하고 아주 만족합니다."</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div>2026 My Service &copy; All Rights Reserved.</div>
    </footer>

    <script>
        const messages = ['오늘도 힘내세요!', '오늘도 해냈어요!', '조금씩 나아지고 있어요!', '이대로 계속 가봅시다.'];
        let idx = 0;
        document.getElementById('nextBtn').onclick = () => {
            idx = (idx + 1) % messages.length;
            document.querySelector('.container h1').textContent = messages[idx];
        };
    </script>
</body>

</html>
